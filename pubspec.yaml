name: game_on
description: GameOn – find sports partners and fill team spots.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  provider: ^6.1.2

  # Calendar
  table_calendar: ^3.1.2

  # Navigation
  go_router: ^14.2.0

  # UI helpers
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Sharing
  share_plus: ^10.0.0

  # HTTP client (Places API)
  http: ^1.2.2

  # Location / maps (optional – geocoding)
  geolocator: ^12.0.0

  # Image picking (profile avatar)
  image_picker: ^1.1.2

  # Localization persistence
  shared_preferences: ^2.3.2

  # Deep links
  app_links: ^6.3.0

  # Icons
  phosphor_flutter: ^2.1.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # App info
  package_info_plus: ^8.0.0

  # Crash reporting & performance
  sentry_flutter: ^9.24.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.1

# Solid colour only — the animated Flutter SplashScreen draws the logo,
# so the native splash must not flash a static one first.
flutter_native_splash:
  color: "#1E293B"
  android_12:
    color: "#1E293B"

# Icon sources are generated from the vector logo path —
# see test/tools/generate_app_icon.dart
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1E293B"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
