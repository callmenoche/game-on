name: game_on
description: GameOn – find sports partners and fill team spots.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  provider: ^6.1.2

  # Calendar
  table_calendar: ^3.1.2

  # Navigation
  go_router: ^14.2.0

  # UI helpers
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Sharing
  share_plus: ^10.0.0

  # Location / maps (optional – geocoding)
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
